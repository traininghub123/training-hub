<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Level Up Session</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#111827,#1f2937);
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
}

/* LIVE BAR */
.live {
  max-width: 900px;
  margin: 15px auto;
  background: #ffffff;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-weight: 600;
}

.dot {
  height: 10px;
  width: 10px;
  background: #dc2626;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.3;}
  100% {opacity:1;}
}

.subtext {
  text-align:center;
  font-size:14px;
  color:#6b7280;
  margin-top:5px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 16px;
}

/* VIDEO */
.video-card {
  background: #000;
  border-radius: 16px;
  overflow: hidden;
}

.video-container {
  position: relative;
  padding-top: 56.25%;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 0;
}

/* POPUP */
#livePopup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box {
  background:#fff;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:85%;
  max-width:320px;
}

.popup-box h3 {
  margin-bottom:10px;
}

.popup-box p {
  font-size:14px;
  color:#374151;
}

.popup-box .warning {
  color:#dc2626;
  font-weight:600;
  margin-top:8px;
}

.popup-btn {
  margin-top:12px;
  padding:10px 16px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">🚀 EXCLUSIVE LEVEL UP SESSION</div>

<div class="live">
  <span class="dot"></span>
  <span class="live-text">
    <span style="color:#dc2626;">LIVE</span> • Waiting to Start
  </span>
</div>

<div class="subtext">
  ⏳ Session starting in <b id="timer">00:20</b>
</div>

<div class="container">

  <div class="video-card">
    <div class="video-container">

      <!-- WORKING VIDEO -->
      <iframe 
      src="https://player.mediadelivery.net/embed/639095/5a72fba4-eb6e-431e-8e6c-1006f1aa803b?autoplay=true&loop=false&muted=false&preload=true"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
      allowfullscreen>
      </iframe>

    </div>
  </div>

</div>

<!-- POPUP -->
<div id="livePopup">
  <div class="popup-box">
    <h3>🔴 Session is LIVE</h3>
    <p>Stay focused and complete this session in one go.</p>
    <p class="warning">Do not take calls or switch apps</p>
    <button class="popup-btn" onclick="closePopup()">Continue</button>
  </div>
</div>

<script>

// 20 sec TEST TIMER
let time = 20;

let timer = setInterval(() => {
  let min = Math.floor(time/60);
  let sec = time%60;

  document.getElementById("timer").innerText =
    (min<10?"0"+min:min)+":"+(sec<10?"0"+sec:sec);

  time--;

  if(time < 0){
    clearInterval(timer);

    // CHANGE TO LIVE MODE
    document.querySelector(".live-text").innerHTML =
      '<span style="color:#dc2626;">LIVE</span> • Training in Progress';

    document.querySelector(".subtext").innerHTML =
      "🚀 Session is LIVE — Do Not Skip";

    // SHOW POPUP
    document.getElementById("livePopup").style.display = "flex";
  }

},1000);

// CLOSE POPUP
function closePopup(){
  document.getElementById("livePopup").style.display = "none";
}

</script>

</body>
</html>
