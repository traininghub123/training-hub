<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Session</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#111827,#1f2937);
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
}

/* LIVE BAR */
.live {
  max-width: 900px;
  margin: 15px auto;
  background: #ffffff;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.dot {
  height: 10px;
  width: 10px;
  background: #dc2626;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.3;}
  100% {opacity:1;}
}

.subtext {
  text-align:center;
  font-size:14px;
  color:#6b7280;
  margin-top:5px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 16px;
}

/* VIDEO */
.video-card {
  background: #000;
  border-radius: 16px;
  overflow: hidden;
}

.video-container {
  position: relative;
  padding-top: 56.25%;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 0;
}

/* BUTTON */
.btn {
  margin-top:15px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

/* POPUP */
#livePopup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">🚀 EXCLUSIVE LEVEL UP SESSION</div>

<div class="live">
  <span class="dot"></span>
  <span class="live-text">
    <span style="color:#dc2626;">LIVE</span> • Waiting to Start
  </span>
</div>

<div class="subtext">
  ⏳ Starting in <b id="timer">00:30</b>
</div>

<div class="container">

  <div class="video-card">
    <div class="video-container">

      <!-- SAME WORKING PLAYER -->
      <iframe 
      src="https://player.mediadelivery.net/embed/639095/5a72fba4-eb6e-431e-8e6c-1006f1aa803b?autoplay=true&loop=false&muted=false&preload=true&responsive=true"
      loading="lazy"
      style="border:0;position:absolute;top:0;height:100%;width:100%;"
      allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;"
      allowfullscreen="true">
      </iframe>

    </div>
  </div>

</div>

<!-- POPUP -->
<div id="livePopup">
  <div style="background:#fff;padding:25px;border-radius:12px;text-align:center;width:80%;max-width:320px;">
    <h3>🔴 Session is LIVE</h3>
    <p>Stay focused and avoid interruptions</p>
    <p style="color:#dc2626;font-weight:600;">Do not take calls during this session</p>
    <button onclick="closePopup()" style="margin-top:10px;padding:10px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;">
      Continue
    </button>
  </div>
</div>

<script>

// 30 sec timer (TEST)
let time = 30;

let timer = setInterval(() => {
  let min = Math.floor(time/60);
  let sec = time%60;

  document.getElementById("timer").innerText =
    (min<10?"0"+min:min)+":"+(sec<10?"0"+sec:sec);

  time--;

  if(time < 0){
    clearInterval(timer);

    // LIVE SWITCH
    document.querySelector(".live-text").innerHTML =
      '<span style="color:#dc2626;">LIVE</span> • Training in Progress';

    document.querySelector(".subtext").innerHTML =
      "🚀 Session is LIVE — Do Not Skip";

    // SHOW POPUP
    document.getElementById("livePopup").style.display = "flex";
  }

},1000);

function closePopup(){
  document.getElementById("livePopup").style.display = "none";
}

</script>

</body>
</html>
