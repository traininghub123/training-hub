<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Hub</title>

<style>
body {
  margin: 0;
  background: #020617;
  font-family: Arial;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 10px;
  border-bottom: 1px solid #111;
}

/* Video */
.video-container {
  position: relative;
}

.video-container iframe {
  width: 100%;
  height: 220px;
  border: none;
}

/* Popup */
.popup {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  text-align: left;
  padding: 20px;
}

.popup-box {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
}

.popup-box h3 {
  margin-top: 0;
}

.popup-box button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">🚀 Training Hub</div>

<div class="video-container">

  <iframe 
    src="https://player.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?token=b0fa828759f43a5aacc099e6c6302b6af3c541334fda1e2d2dcc06c569b845cf&expires=1776458049&autoplay=true"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <!-- Popup -->
  <div class="popup" id="popup">
    <div class="popup-box">
      <h3>📌 Important Instructions</h3>
      <ul>
        <li>Watch full video</li>
        <li>Do not skip</li>
        <li>Complete in one go</li>
        <li>Code milega end me</li>
      </ul>

      <button onclick="closePopup()">Continue Watching</button>
    </div>
  </div>

</div>

<script>
setTimeout(() => {
  document.getElementById("popup").style.display = "flex";
}, 10000); // 10 seconds

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
