<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

.header {
  background: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.video-card {
  background: black;
  border-radius: 16px;
  overflow: hidden;
}

.video-container {
  position: relative;
  padding-top: 56.25%;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 0;
}

.instructions {
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="header">🚀 Training Hub</div>

<div class="container">

  <div class="video-card">
    <div class="video-container">
      <iframe 
      src="https://player.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?autoplay=true&muted=true"
      allow="autoplay; encrypted-media"
      allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="instructions">
    <h3>📌 Important Instructions</h3>
    <ul>
      <li>Watch full video carefully</li>
      <li>Do not skip</li>
      <li>Complete in one go</li>
    </ul>
  </div>

</div>

<script>
// keyboard block (partial)
document.addEventListener("keydown", function(e) {
  if (["ArrowRight","ArrowLeft"," ","k","j","l"].includes(e.key)) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
