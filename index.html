<!DOCTYPE html>
<html>
<head>
<title>Training Hub</title>

<style>
body {
  margin:0;
  background:black;
}

video {
  width:100vw;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<video id="video" autoplay controls controlsList="nodownload noplaybackrate">
  <source src="https://drive.google.com/uc?export=download&id=1MYmkVFiNGASEHpsvpjbSCMkHq5df4Qms" type="video/mp4">
</video>

<script>

let video = document.getElementById("video");

// Force fullscreen
video.addEventListener("play", () => {
  if (video.requestFullscreen) video.requestFullscreen();
});

// Block skipping
video.addEventListener("seeking", function() {
  if (video.currentTime > video.lastTime) {
    video.currentTime = video.lastTime;
  }
});

video.addEventListener("timeupdate", function() {
  video.lastTime = video.currentTime;
});

// Disable keyboard
document.onkeydown = function(e) {
  return false;
};

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Restart if refresh
window.onload = () => {
  video.currentTime = 0;
};

</script>

</body>
</html>
