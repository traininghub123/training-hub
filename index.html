<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.header {
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg,#020617,#1e293b);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.video-box {
  position: relative;
  background: #020617;
  padding: 15px;
  border-radius: 12px;
}

iframe {
  width: 100%;
  height: 500px;
  border-radius: 10px;
  border: none;
}

/* FULL BLOCK LAYER */
.overlay {
  position: absolute;
  top: 15px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  z-index: 10;
}

/* CENTER PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  background: rgba(34,197,94,0.9);
  padding: 20px 30px;
  border-radius: 50px;
  font-size: 18px;
  cursor: pointer;
}

/* AFTER START BLOCK */
.blocked {
  pointer-events: none;
}

.instructions {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="header">🚀 Training Hub</div>

<div class="container">

<div class="video-box">

  <!-- YOUTUBE VIDEO -->
  <iframe id="videoFrame" src=""></iframe>

  <!-- FULL BLOCK -->
  <div id="overlay" class="overlay"></div>

  <!-- CENTER PLAY -->
  <div id="playBtn" class="play-btn" onclick="startVideo()">▶ Start</div>

</div>

<button id="nextBtn" onclick="checkCode()">Proceed Next</button>

<div class="instructions">
<h3>📌 Instructions</h3>
<ul>
<li>Sirf beech ke button se video start hoga</li>
<li>Video skip nahi kar sakte</li>
<li>Pura dekhna mandatory hai</li>
<li>End me code milega</li>
</ul>
</div>

</div>

<script>

// Disable keyboard
document.onkeydown = function(e) {
  return false;
};

// START VIDEO
function startVideo() {

  document.getElementById("videoFrame").src =
  "https://www.youtube.com/embed/Qlh9fxv_S_0?controls=0&disablekb=1&modestbranding=1&rel=0&fs=0&iv_load_policy=3&playsinline=1&autoplay=1";

  document.getElementById("playBtn").style.display = "none";

  // 3 sec baad pura block
  setTimeout(() => {
    document.getElementById("overlay").classList.add("blocked");
  }, 3000);
}

// TIMER (1hr 3min)
setTimeout(() => {
  document.getElementById("nextBtn").style.display = "block";
}, 3780000);

// CODE CHECK
function checkCode() {
  let code = prompt("Enter code:");
  if(code === "SRP123") {
    alert("Access Granted ✅");
  } else {
    alert("Wrong Code ❌");
  }
}

</script>

</body>
</html>
