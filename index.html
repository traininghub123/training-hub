<!DOCTYPE html>
<html>
<head>
  <title>Training Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>

<div class="video-container">
  <iframe 
    src="https://player.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?autoplay=true&loop=false&muted=false&preload=true&responsive=true"
    loading="lazy"
    allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
