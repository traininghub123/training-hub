<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Hub</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 900px;
      padding-top: 56.25%; /* 16:9 ratio */
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="video-container">
    <iframe 
      src="https://iframe.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?autoplay=true&muted=false"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
