<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: white;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  background: #020617;
  padding: 8px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid #111;
}

/* Main */
.main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0; /* ❌ remove extra space */
}

/* Video */
.video-container {
  width: 100%;
  height: 55vh; /* balanced */
  margin: 0; /* ❌ no gap */
}

.video-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Instructions */
.instructions {
  margin: 10px;
  padding: 14px;
  background: #0f172a;
  border-radius: 10px;
  font-size: 13px;
}

.instructions h3 {
  margin-bottom: 8px;
}

.instructions ul {
  padding-left: 18px;
  line-height: 1.5;
}

/* Desktop */
@media(min-width:768px){
  .video-container {
    height: 75vh;
  }
}
</style>

</head>

<body>

<div class="header">
🚀 Training Hub
</div>

<div class="main">

  <div class="video-container">
    <iframe 
    src="https://player.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?token=b0fa828759f43a5aacc099e6c6302b6af3c541334fda1e2d2dcc06c569b845cf&expires=1776458049&autoplay=true&loop=false&muted=false&preload=true&responsive=true"
    allow="autoplay; encrypted-media"
    allowfullscreen>
    </iframe>
  </div>

  <div class="instructions">
    <h3>📌 Important Instructions</h3>
    <ul>
      <li>Watch the full training video carefully.</li>
      <li>Do not skip or leave the session.</li>
      <li>This training must be completed in one go.</li>
      <li>A verification code will be shown at the end.</li>
      <li>Share the code with your mentor to unlock next session.</li>
    </ul>
  </div>

</div>

</body>
</html>
