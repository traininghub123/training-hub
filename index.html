<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#020617,#020617,#0f172a);
  color: white;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.8);
  backdrop-filter: blur(10px);
  padding: 14px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Video Card */
.video-wrapper {
  padding: 15px;
}

.video-container {
  position: relative;
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.video-container iframe {
  width: 100%;
  height: 220px;
  border: none;
}

/* Instructions Card */
.instructions {
  margin: 15px;
  padding: 18px;
  background: rgba(15,23,42,0.7);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
}

.instructions h3 {
  margin-top: 0;
}

.instructions ul {
  padding-left: 18px;
  line-height: 1.6;
  color: #cbd5f5;
}

/* Desktop */
@media(min-width:768px){
  .video-container iframe{
    height: 450px;
  }
}
</style>

</head>

<body>

<div class="header">
🚀 Training Hub
</div>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
    src="https://player.mediadelivery.net/embed/639095/1272f98f-576e-47e9-9803-957e3ae7e007?token=b0fa828759f43a5aacc099e6c6302b6af3c541334fda1e2d2dcc06c569b845cf&expires=1776458049&autoplay=true&loop=false&muted=false&preload=true&responsive=true"
    allow="autoplay; encrypted-media"
    allowfullscreen>
    </iframe>
  </div>
</div>

<div class="instructions">
<h3>📌 Important Instructions</h3>
<ul>
<li>Watch the full training video carefully.</li>
<li>Do not skip or leave the session.</li>
<li>This training must be completed in one go.</li>
<li>A verification code will be shown at the end.</li>
<li>Share the code with your mentor to unlock next session.</li>
</ul>
</div>

</body>
</html>
